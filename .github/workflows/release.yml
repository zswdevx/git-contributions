name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          GIT_COMMIT=${{ github.sha }}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p bin

          # Windows AMD64 (64位)
          GOOS=windows GOARCH=amd64 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-windows-amd64.exe .

          # Windows ARM64 (如高通骁龙笔记本、树莓派 Windows 版)
          GOOS=windows GOARCH=arm64 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-windows-arm64.exe .

          # Windows 386 (32位系统)
          GOOS=windows GOARCH=386 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-windows-386.exe .

          # Linux AMD64 (64位)
          GOOS=linux GOARCH=amd64 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-linux-amd64 .

          # Linux ARM64 (树莓派、服务器等)
          GOOS=linux GOARCH=arm64 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-linux-arm64 .

          # Darwin (macOS) AMD64 (Intel Mac)
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-darwin-amd64 .

          # Darwin (macOS) ARM64 (Apple Silicon: M1/M2/M3)
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X 'github.com/zsw/git-contributions/version.Version=${VERSION}' -X 'github.com/zsw/git-contributions/version.GitCommit=${GIT_COMMIT}' -X 'github.com/zsw/git-contributions/version.BuildDate=${BUILD_DATE}'" -o bin/git-contrib-darwin-arm64 .

      - name: Create archives
        run: |
          cd bin
          for file in git-contrib-*; do
            if [ -f "$file" ]; then
              # Create zip for Windows (easier to extract on Windows)
              if [[ "$file" == *windows* ]]; then
                zip "${file}.zip" "$file"
                sha256sum "${file}.zip" > "${file}.zip.sha256"
              else
                # Create tar.gz for Linux/macOS
                tar -czf "${file}.tar.gz" "$file"
                sha256sum "${file}.tar.gz" > "${file}.tar.gz.sha256"
              fi
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.tar.gz
          body: |
            ## git-contrib ${{ steps.get_version.outputs.VERSION }}

            ### 下载
            选择适合你系统的版本：

            **Windows**:
            - `git-contrib-windows-amd64.exe.tar.gz` - 64位系统（推荐）
            - `git-contrib-windows-arm64.exe.tar.gz` - ARM64 设备（高通骁龙笔记本）
            - `git-contrib-windows-386.exe.tar.gz` - 32位系统（老旧电脑）

            **Linux**:
            - `git-contrib-linux-amd64.tar.gz` - 64位系统（推荐）
            - `git-contrib-linux-arm64.tar.gz` - ARM64 设备（树莓派、服务器）

            **macOS**:
            - `git-contrib-darwin-amd64.tar.gz` - Intel Mac
            - `git-contrib-darwin-arm64.tar.gz` - Apple Silicon (M1/M2/M3)

            ### 安装
            ```bash
            # 下载后解压
            tar -xzf git-contrib-*.tar.gz

            # 赋予执行权限（Linux/macOS）
            chmod +x git-contrib-*

            # 移动到 PATH（可选）
            mv git-contrib-* /usr/local/bin/git-contrib
            ```

            ### 使用
            ```bash
            git-contrib heatmap
            ```

            ### 变更日志
            查看 [CHANGELOG.md](CHANGELOG.md) 了解详细变更。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
